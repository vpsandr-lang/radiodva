<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIO DVA — Админка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0b0b1a; color:#e0e0f0; padding:32px; }
        .container { max-width:800px; margin:0 auto; }
        h1 { font-size:1.5rem; margin-bottom:24px; color:#818cf8; }
        .card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:24px; margin-bottom:20px; }
        h2 { font-size:1.1rem; margin-bottom:16px; }
        label { display:block; font-size:0.8rem; color:rgba(255,255,255,0.4); margin-bottom:6px; }
        input, textarea { width:100%; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:8px; color:#e0e0f0; font-family:inherit; font-size:0.9rem; margin-bottom:12px; }
        input:focus, textarea:focus { border-color:#6366f1; outline:none; }
        .row { display:flex; gap:12px; }
        .row > * { flex:1; }
        button { padding:10px 24px; background:linear-gradient(135deg,#6366f1,#a855f7); color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-family:inherit; }
        button:hover { transform:translateY(-1px); }
        .status { padding:10px; border-radius:8px; font-size:0.85rem; margin-top:12px; }
        .status.ok { background:rgba(34,197,94,0.1); color:#22c55e; border:1px solid rgba(34,197,94,0.2); }
        .status.err { background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); }
        .msg { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.85rem; }
        .msg strong { color:#818cf8; }
        .msg small { color:rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<div class="container">
    <h1>🎧 RADIO DVA · Админ-панель</h1>

    <div class="card">
        <h2>🎵 Сейчас в эфире</h2>
        <div class="row">
            <div><label>Название трека</label><input id="npTitle" placeholder="Название" value="Prada"></div>
            <div><label>Исполнитель</label><input id="npArtist" placeholder="Исполнитель" value="cassö, RAYE, D-Block Europe"></div>
        </div>
        <div class="row">
            <div><label>Флаг/Эмодзи</label><input id="npFlag" value="🌍"></div>
            <div><label>&nbsp;</label><button onclick="updateNowPlaying()">Обновить эфир</button></div>
        </div>
        <div id="npStatus"></div>
    </div>

    <div class="card">
        <h2>📝 Сообщения слушателей</h2>
        <div id="messages"><p style="color:rgba(255,255,255,0.3)">Загрузка...</p></div>
    </div>

    <div class="card">
        <h2>📊 Статистика</h2>
        <div id="stats"><p style="color:rgba(255,255,255,0.3)">Загрузка...</p></div>
    </div>
</div>
<script>
const API = 'http://localhost:5050';

async function updateNowPlaying() {
    const data = {
        title: document.getElementById('npTitle').value,
        artist: document.getElementById('npArtist').value,
        flag: document.getElementById('npFlag').value,
    };
    const status = document.getElementById('npStatus');
    try {
        const res = await fetch(`${API}/api/now-playing`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });
        const json = await res.json();
        status.className = 'status ok';
        status.textContent = '✅ Трек обновлён!';
    } catch(e) {
        status.className = 'status err';
        status.textContent = '❌ Ошибка: ' + e.message;
    }
    setTimeout(() => status.textContent = '', 3000);
}

async function loadMessages() {
    const el = document.getElementById('messages');
    try {
        const res = await fetch(`${API}/api/messages`);
        const msgs = await res.json();
        if (msgs.length === 0) {
            el.innerHTML = '<p style="color:rgba(255,255,255,0.3)">Пока нет сообщений</p>';
            return;
        }
        el.innerHTML = msgs.slice(-10).reverse().map(m =>
            `<div class="msg"><strong>${m.name}</strong>: ${m.text} <small>· ${new Date(m.timestamp*1000).toLocaleTimeString()}</small></div>`
        ).join('');
    } catch(e) {
        el.innerHTML = '<p style="color:rgba(255,255,255,0.3)">API недоступен</p>';
    }
}

async function loadStats() {
    const el = document.getElementById('stats');
    try {
        const res = await fetch(`${API}/api/stats`);
        const s = await res.json();
        el.innerHTML = `
            <p>👥 Слушателей: <strong>${s.listeners}</strong></p>
            <p>📈 Пик сегодня: <strong>${s.today_peak}</strong></p>
            <p>🎵 Всего треков: <strong>${s.total_tracks_played}</strong></p>
        `;
    } catch(e) {
        el.innerHTML = '<p style="color:rgba(255,255,255,0.3)">API недоступен</p>';
    }
}

loadMessages();
loadStats();
setInterval(loadMessages, 10000);
</script>
</body>
</html>
